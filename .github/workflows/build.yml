name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            geos-install: sudo apt-get update -qq && sudo apt-get install -y -qq libgeos-dev
            cmake-args: -DCMAKE_BUILD_TYPE=Release
            binary-suffix: ""
            binary-dir: build
          - os: windows-latest
            geos-install: vcpkg install geos --triplet x64-windows
            cmake-args: -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows
            binary-suffix: .exe
            binary-dir: build/Release
          - os: macos-latest
            geos-install: brew install geos
            cmake-args: -DCMAKE_BUILD_TYPE=Release
            binary-suffix: ""
            binary-dir: build

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install GEOS
        run: ${{ matrix.geos-install }}

      - name: Configure
        run: cmake -S . -B build ${{ matrix.cmake-args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Quick smoke test
        shell: bash
        run: |
          BIN="${{ matrix.binary-dir }}/tnavmesh${{ matrix.binary-suffix }}"
          test -f "$BIN" || { echo "Binary not found: $BIN"; exit 1; }
          "$BIN" --version
          "$BIN" --help
