name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            geos-install: sudo apt-get update -qq && sudo apt-get install -y -qq libgeos-dev
            cmake-args: -DCMAKE_BUILD_TYPE=Release
            asset-name: tnavmesh-linux-x86_64
            binary-suffix: ""
            binary-dir: build
          - os: windows-latest
            geos-install: vcpkg install geos --triplet x64-windows
            cmake-args: -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows
            asset-name: tnavmesh-windows
            binary-suffix: .exe
            binary-dir: build/Release
          - os: macos-latest
            geos-install: brew install geos
            cmake-args: -DCMAKE_BUILD_TYPE=Release
            asset-name: tnavmesh-macos-x86_64
            binary-suffix: ""
            binary-dir: build

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get arch
        id: arch
        shell: bash
        run: |
          arch=$(uname -m)
          if [ "$arch" = "arm64" ]; then arch="aarch64"; fi
          echo "value=$arch" >> "$GITHUB_OUTPUT"

      - name: Install GEOS
        run: ${{ matrix.geos-install }}

      - name: Configure
        run: cmake -S . -B build ${{ matrix.cmake-args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: |
          mkdir -p package
          cp LICENSE README.md package/ 2>/dev/null || true
          cp "${{ matrix.binary-dir }}/tnavmesh${{ matrix.binary-suffix }}" package/
          cd package
          zip -r ../tnavmesh-${{ matrix.asset-name }}-${{ steps.arch.outputs.value }}.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tnavmesh-${{ matrix.asset-name }}-${{ steps.arch.outputs.value }}
          path: tnavmesh-${{ matrix.asset-name }}-${{ steps.arch.outputs.value }}.zip

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
