name: Release

on:
  push:
    tags: ["v*"]

env:
  RECAST_TAG: v1.6.0
  POLY2TRI_TAG: master

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            geos-install: sudo apt-get update -qq && sudo apt-get install -y -qq libgeos-dev
            cmake-args: -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5
            asset-base: tnavmesh-linux
            binary-suffix: ""
            binary-dir: build
          - os: windows-latest
            geos-install: vcpkg install --triplet x64-windows
            cmake-args: -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows
            asset-base: tnavmesh-windows
            binary-suffix: .exe
            binary-dir: build/Release
          - os: macos-latest
            geos-install: brew install geos
            cmake-args: -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5
            asset-base: tnavmesh-macos
            binary-suffix: ""
            binary-dir: build

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone third-party dependencies
        shell: bash
        run: |
          git clone --depth 1 --branch ${{ env.RECAST_TAG }} \
            https://github.com/recastnavigation/recastnavigation.git \
            third_party/recastnavigation
          git clone --depth 1 --branch ${{ env.POLY2TRI_TAG }} \
            https://github.com/jhasse/poly2tri.git \
            third_party/poly2tri

      - name: Get arch
        id: arch
        shell: bash
        run: |
          arch=$(uname -m)
          if [ "$arch" = "arm64" ]; then arch="aarch64"; fi
          echo "value=$arch" >> "$GITHUB_OUTPUT"

      - name: Install GEOS
        run: ${{ matrix.geos-install }}

      - name: Configure
        run: cmake -S . -B build ${{ matrix.cmake-args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Quick smoke test
        shell: bash
        run: |
          BIN="${{ matrix.binary-dir }}/tnavmesh${{ matrix.binary-suffix }}"
          test -f "$BIN" || { echo "Binary not found: $BIN"; exit 1; }
          "$BIN" --version
          "$BIN" --help

      - name: Package
        shell: bash
        run: |
          ASET="${{ matrix.asset-base }}-${{ steps.arch.outputs.value }}"
          mkdir -p package
          cp LICENSE README.md package/ 2>/dev/null || true
          cp "${{ matrix.binary-dir }}/tnavmesh${{ matrix.binary-suffix }}" package/
          cd package
          zip -r ../tnavmesh-${ASET}.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tnavmesh-${{ matrix.asset-base }}-${{ steps.arch.outputs.value }}
          path: tnavmesh-${{ matrix.asset-base }}-${{ steps.arch.outputs.value }}.zip

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
